services:
  - type: web
    name: protocolsnerd-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd protocolsnerd-backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: EXECUTION_STRATEGY
        value: agentic
      # Hosted deploys use Claude — there is no GPU on a free host to run Ollama.
      # Local dev keeps Ollama via variables.env (LLM_PROVIDER=ollama).
      - key: LLM_PROVIDER
        value: claude
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
      - key: PROTOCOLS_IO_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: protocolsnerd-frontend
    runtime: static
    buildCommand: python3 scripts/write_frontend_env.py
    staticPublishPath: protocolsnerd-website
    envVars:
      - key: PROTOCOLSNERD_API_URL
        fromService:
          type: web
          name: protocolsnerd-backend
          envVarKey: RENDER_EXTERNAL_URL
