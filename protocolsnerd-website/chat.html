<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Protocols Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f6fa;
      color: #1a1a2e;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a2e;
    }

    header span.badge {
      font-size: 12px;
      background: #eef2ff;
      color: #4361ee;
      border-radius: 12px;
      padding: 3px 10px;
      font-weight: 500;
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
    }

    .message {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message.user .bubble {
      background: #4361ee;
      color: #fff;
      align-self: flex-end;
      border-radius: 18px 18px 4px 18px;
      padding: 12px 16px;
      max-width: 70%;
      font-size: 15px;
      line-height: 1.5;
    }

    .message.assistant .bubble {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 18px 18px 18px 4px;
      padding: 16px;
      max-width: 100%;
      font-size: 14px;
      line-height: 1.6;
    }

    .explanation {
      font-size: 14px;
      color: #444;
      line-height: 1.7;
      margin-bottom: 14px;
      padding: 12px 14px;
      background: #f0f4ff;
      border-left: 3px solid #4361ee;
      border-radius: 0 8px 8px 0;
    }

    .results-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .protocol-card {
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 14px 16px;
      background: #fafafa;
      transition: border-color 0.15s;
    }

    .protocol-card:hover { border-color: #4361ee; }

    .protocol-card .rank {
      font-size: 11px;
      font-weight: 700;
      color: #4361ee;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }

    .protocol-card .title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .protocol-card .title a {
      color: #1a1a2e;
      text-decoration: none;
    }

    .protocol-card .title a:hover { color: #4361ee; text-decoration: underline; }

    .protocol-card .desc {
      font-size: 13px;
      color: #555;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .protocol-card .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 12px;
      color: #777;
    }

    .protocol-card .meta .tag {
      background: #eef2ff;
      color: #4361ee;
      border-radius: 10px;
      padding: 2px 8px;
      font-weight: 500;
    }

    .protocol-card .score-bar {
      height: 3px;
      background: #e0e0e0;
      border-radius: 2px;
      margin-top: 10px;
      overflow: hidden;
    }

    .protocol-card .score-bar .fill {
      height: 100%;
      background: #4361ee;
      border-radius: 2px;
    }

    .thinking {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #888;
      font-size: 14px;
      padding: 8px 0;
    }

    .dot-anim span {
      display: inline-block;
      width: 6px; height: 6px;
      background: #4361ee;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot-anim span:nth-child(2) { animation-delay: 0.2s; }
    .dot-anim span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    #input-area {
      background: #fff;
      border-top: 1px solid #e0e0e0;
      padding: 16px 24px;
    }

    #input-row {
      display: flex;
      gap: 10px;
      max-width: 860px;
      margin: 0 auto;
    }

    #query-input {
      flex: 1;
      border: 1.5px solid #d0d5e8;
      border-radius: 24px;
      padding: 12px 20px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    #query-input:focus { border-color: #4361ee; }

    #send-btn {
      background: #4361ee;
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
      white-space: nowrap;
    }

    #send-btn:hover { background: #3451d1; }
    #send-btn:disabled { background: #b0bbf0; cursor: not-allowed; }

    .hint {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      margin-top: 8px;
    }

    .empty-state {
      text-align: center;
      color: #aaa;
      margin: auto;
      padding: 40px;
    }

    .empty-state h2 { font-size: 22px; font-weight: 600; color: #555; margin-bottom: 10px; }
    .empty-state p { font-size: 14px; line-height: 1.7; }

    .example-queries {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 18px;
    }

    .example-queries button {
      background: #fff;
      border: 1px solid #d0d5e8;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 13px;
      color: #555;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    .example-queries button:hover {
      background: #eef2ff;
      border-color: #4361ee;
      color: #4361ee;
    }

    .error-bubble {
      background: #fff3f3;
      border: 1px solid #ffb3b3;
      color: #c0392b;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
    }

    /* Clarification bubble — styled slightly differently to stand out */
    .clarification-bubble {
      background: #fffbea;
      border: 1px solid #f0c040;
      border-left: 3px solid #f0c040;
      border-radius: 0 8px 8px 0;
      padding: 12px 16px;
      font-size: 14px;
      color: #5a4a00;
      line-height: 1.6;
    }

    .quick-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .quick-option-btn {
      background: #fff;
      border: 1px solid #f0c040;
      border-radius: 16px;
      color: #5a4a00;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      padding: 6px 12px;
      transition: all 0.15s;
    }

    .quick-option-btn:hover {
      background: #fff4c2;
    }

    .quick-options-hint {
      margin-top: 8px;
      font-size: 11px;
      font-style: italic;
      color: #9a8a4a;
    }

    .query-selection-card {
      background: #f8fbff;
      border: 1px solid #cbd8f5;
      border-radius: 8px;
      margin-top: 12px;
      padding: 14px;
    }

    .query-selection-card h3 {
      color: #263047;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .query-selection-card p {
      color: #5c6475;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .candidate-query-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }

    .candidate-query-row {
      align-items: center;
      background: #fff;
      border: 1px solid #dce3f5;
      border-radius: 8px;
      display: flex;
      gap: 10px;
      justify-content: space-between;
      padding: 9px 10px;
    }

    .candidate-query-text {
      color: #29324a;
      font-size: 13px;
      line-height: 1.4;
    }

    .candidate-query-btn,
    .candidate-search-all-btn {
      background: #4361ee;
      border: none;
      border-radius: 14px;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 12px;
      white-space: nowrap;
    }

    .candidate-query-btn.secondary {
      background: #fff;
      border: 1px solid #cbd8f5;
      color: #4361ee;
    }

    .candidate-edit-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .candidate-edit-row input {
      border: 1px solid #cbd8f5;
      border-radius: 16px;
      flex: 1;
      font-family: inherit;
      font-size: 13px;
      padding: 8px 12px;
    }

    .profile-card {
      background: #f8fafc;
      border: 1px solid #dce3f0;
      border-radius: 8px;
      margin: 12px 0;
      padding: 12px;
    }

    .profile-card h3 {
      color: #29324a;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .profile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 7px;
    }

    .profile-field {
      background: #fff;
      border: 1px solid #e5e9f3;
      border-radius: 6px;
      padding: 7px 9px;
    }

    .profile-field .label {
      color: #7a8399;
      display: block;
      font-size: 11px;
      margin-bottom: 2px;
    }

    .profile-field .value {
      color: #263047;
      font-size: 12px;
      font-weight: 600;
    }

    .profile-field.missing .value {
      color: #a0a7b8;
      font-weight: 500;
    }

    .profile-field.optional {
      border-style: dashed;
      border-color: #d4d9e6;
      opacity: 0.8;
    }

    .profile-field .optional-tag {
      color: #a0a7b8;
      font-size: 9px;
      font-weight: 400;
      margin-left: 4px;
    }

    .match-explanation {
      background: #fff;
      border: 1px solid #e5e9f3;
      border-radius: 6px;
      color: #4b5568;
      font-size: 12px;
      line-height: 1.5;
      margin-top: 10px;
      padding: 8px 10px;
    }

    .match-explanation strong {
      color: #29324a;
    }

    /* Expanded queries shown as small tags below the explanation */
    .expanded-queries {
      margin-top: 10px;
      font-size: 12px;
      color: #888;
    }

    .expanded-queries span {
      display: inline-block;
      background: #f0f4ff;
      border: 1px solid #d0d5e8;
      border-radius: 10px;
      padding: 2px 10px;
      margin: 3px 3px 0 0;
      color: #4361ee;
      font-size: 11px;
    }

    .expanded-queries .label {
      background: none;
      border: none;
      color: #aaa;
      padding: 2px 4px 2px 0;
      font-style: italic;
    }

    /* Feedback section shown after search results */
    .feedback-section {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #e0e0e0;
    }

    .feedback-section p {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }

    .feedback-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .feedback-btn {
      background: #fff;
      border: 1px solid #d0d5e8;
      border-radius: 16px;
      padding: 5px 12px;
      font-size: 12px;
      color: #4361ee;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    .feedback-btn:hover {
      background: #eef2ff;
      border-color: #4361ee;
    }
  </style>
</head>
<body>

<header>
  <h1>Protocols Assistant</h1>
  <select id="provider-select" style="padding: 6px 12px; border: 1px solid #d0d5e8; border-radius: 6px; font-size: 13px; cursor: pointer;">
    <option value="claude">Claude (Sonnet)</option>
    <option value="openai" selected>OpenAI (gpt-4o-mini)</option>
    <option value="gemini">Gemini (Flash)</option>
    <option value="ollama">Local (Ollama)</option>
  </select>
  <label style="font-size: 12px; color: #666; display: flex; align-items: center; gap: 5px;">
    Search Mode
    <select id="search-mode-select" style="padding: 6px 10px; border: 1px solid #d0d5e8; border-radius: 6px; font-size: 13px; cursor: pointer;">
      <option value="local" selected>Local RAG (Fast)</option>
      <option value="live">Live API (Comprehensive)</option>
    </select>
  </label>
  <label style="font-size: 12px; color: #666; display: flex; align-items: center; gap: 5px;">
    Per source
    <select id="per-source-select" style="padding: 6px 10px; border: 1px solid #d0d5e8; border-radius: 6px; font-size: 13px; cursor: pointer;">
      <option value="3">3</option>
      <option value="5" selected>5</option>
      <option value="10">10</option>
    </select>
  </label>
  <span class="badge" id="index-badge">Loading index...</span>
</header>

<div id="chat-container">
  <div class="empty-state" id="empty-state">
    <h2>Find the right protocol</h2>
    <p>Describe what experiment you need to run.<br>The assistant will find the most relevant protocols from protocols.io.</p>
    <div class="example-queries">
      <button onclick="useExample(this)">RNA extraction from plant tissue</button>
      <button onclick="useExample(this)">PCR protocol for gene cloning</button>
      <button onclick="useExample(this)">western blot for protein detection</button>
      <button onclick="useExample(this)">CRISPR gene editing in mammalian cells</button>
      <button onclick="useExample(this)">arabidopsis transformation protocol</button>
      <button onclick="useExample(this)">cell viability assay</button>
      <button onclick="useExample(this)">Find protocols that can allow in-planta tests in which genes are modified.</button>
      <button onclick="useExample(this)">Find protocols that allow more than one transcription factor to be modified at the same time for mice.</button>
      <button onclick="useExample(this)">Find protocols that test for drought tolerance in Rice.</button>
    </div>
  </div>
</div>

<div id="input-area">
  <div id="input-row">
    <input
      id="query-input"
      type="text"
      placeholder="e.g. RNA extraction from plant leaves..."
      autocomplete="off"
    />
    <button id="send-btn" onclick="sendQuery()">Search</button>
  </div>
  <p class="hint">Press Enter to search &nbsp;·&nbsp; Searching <span id="protocol-count">...</span> protocols</p>
</div>

<script src="env.js"></script>
<script>
  const BACKEND = (
    window.PROTOCOLSNERD_API_URL ||
    window.PROTOCOLSNERD_BACKEND_URL ||
    window.env?.FRONTEND_FLOW?.API_URL ||
    'http://localhost:8001'
  ).replace(/\/+$/, '');

  // Used only for deliberate refinement flows such as feedback buttons.
  // Clarification answers keep using the profile state instead.
  let skipClarification = false;

  // Remembers the last successfully searched query for feedback prefill
  let lastSearchQuery = '';

  // Client-side conversation state for the current experimental goal.
  let experimentProfile = null;
  let currentExperimentQuery = '';
  let latestCandidateQueries = [];
  let pendingSearchConfirmed = false;
  let pendingSelectedSearchQuery = '';
  let pendingSearchAll = false;
  // True after the assistant asks a clarification — the next message is its answer,
  // so the backend should refine (not reset) the current experiment profile.
  let awaitingClarificationAnswer = false;

  // -------------------------------------------------------------------------
  // Startup: health check and protocol count
  // -------------------------------------------------------------------------

  async function checkHealth() {
    try {
      const r = await fetch(`${BACKEND}/health`);
      const data = await r.json();
      if (data.status === 'healthy' || data.status === 'degraded') {
        markBackendOnline('Connected');
      }
    } catch {
      document.getElementById('index-badge').textContent = 'Backend offline';
      document.getElementById('index-badge').style.background = '#fff0f0';
      document.getElementById('index-badge').style.color = '#c0392b';
    }
  }

  async function updateProtocolCount() {
    try {
      const r = await fetch(`${BACKEND}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          query: 'PCR',
          top_k: 1,
          explain: false,
          skip_clarification: true,
          search_mode: 'local',
        }),
      });
      if (r.ok) {
        const data = await r.json();
        const count = data.total_protocols_indexed || 0;
        document.getElementById('protocol-count').textContent = count.toLocaleString();
        markBackendOnline(`${count.toLocaleString()} protocols indexed`);
      }
    } catch {}
  }

  function markBackendOnline(text = 'Connected') {
    const badge = document.getElementById('index-badge');
    if (!badge) return;
    badge.textContent = text;
    badge.style.background = '#eef2ff';
    badge.style.color = '#4361ee';
  }

  checkHealth();
  updateProtocolCount();

  document.getElementById('query-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) sendQuery();
  });

  function useExample(btn) {
    resetExperimentState();
    document.getElementById('query-input').value = btn.textContent;
    sendQuery();
  }

  // -------------------------------------------------------------------------
  // DOM helpers
  // -------------------------------------------------------------------------

  function appendMessage(role, html) {
    const emptyState = document.getElementById('empty-state');
    if (emptyState) emptyState.remove();
    const container = document.getElementById('chat-container');
    const msg = document.createElement('div');
    msg.className = `message ${role}`;
    msg.innerHTML = html;
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
    return msg;
  }

  function escapeHtml(str) {
    return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function escapeAttr(str) {
    return escapeHtml(str).replace(/"/g, '&quot;');
  }

  function humanizeProfileValue(value) {
    if (!value) return value;
    return String(value).replace(/_/g, ' ');
  }

  function renderIntentSpecific(profile) {
    const raw = profile?.intent_specific;
    if (!raw || typeof raw !== 'object' || Array.isArray(raw)) return '';
    const parts = Object.entries(raw)
      .filter(([_, value]) => value !== null && value !== undefined && value !== '' && !(Array.isArray(value) && !value.length))
      .map(([key, value]) => {
        const shown = Array.isArray(value) ? value.join(', ') : String(value);
        return `${humanizeProfileValue(key)}: ${shown}`;
      });
    return parts.join('; ');
  }

  function resetExperimentState() {
    experimentProfile = null;
    currentExperimentQuery = '';
    latestCandidateQueries = [];
    pendingSearchConfirmed = false;
    pendingSelectedSearchQuery = '';
    pendingSearchAll = false;
    skipClarification = false;
    awaitingClarificationAnswer = false;
  }

  function renderExperimentProfile(profile, intent) {
    if (!profile) return '';
    const rows = [
      ['Intent', intent?.label || profile.experimental_method || 'unknown'],
      ['Intent family', intent?.intent_family_label || humanizeProfileValue(profile.intent_family)],
      ['Sub-intent', intent?.sub_intent_label || humanizeProfileValue(profile.sub_intent)],
      ['Organism', profile.organism],
      ['Sample type', profile.sample_type],
      ['System', profile.tissue_or_cell_type],
      ['Target', profile.target],
      ['Gene/construct', profile.gene_or_construct],
      ['Modification type', profile.modification_type],
      ['Method', profile.method || profile.experimental_method],
      ['Delivery method', profile.delivery_method],
      ['Expression type', profile.expression_type],
      ['Readout', profile.readout || profile.readout_assay],
      ['Condition', profile.condition],
      ['Timeline', profile.timeline],
      ['Equipment', Array.isArray(profile.equipment) && profile.equipment.length ? profile.equipment.join(', ') : (Array.isArray(profile.required_equipment) ? profile.required_equipment.join(', ') : profile.required_equipment)],
      ['Difficulty', profile.difficulty || profile.protocol_difficulty],
      ['Constraints', Array.isArray(profile.constraints) ? profile.constraints.join(', ') : profile.constraints],
      ['Intent-specific', renderIntentSpecific(profile)],
    ];

    const requiredFieldsByIntent = {
      gene_modification:             ['Organism', 'Modification type', 'System'],
      genome_editing:                ['Organism', 'Modification type', 'System'],
      multiplex_gene_modification:   ['Organism', 'Modification type', 'System', 'Target'],
      gene_overexpression:           ['Organism', 'Expression type', 'System'],
      gene_knockdown:                ['Organism', 'Method'],
      stress_tolerance_assay:        ['Organism', 'Condition', 'Readout'],
      protein_purification:          ['Target', 'Organism'],
      pcr_qpcr:                      ['Organism', 'Readout'],
      transformation:                ['Organism', 'Method'],
      microscopy:                    ['Organism', 'System'],
      sequencing_prep:               ['Organism', 'Readout'],
      cloning:                       ['Organism', 'Target'],
      mutagenesis:                   ['Organism', 'Modification type'],
      western_blot:                  ['Organism', 'Target'],
      immunoprecipitation:           ['Organism', 'Target'],
      protein_extraction:            ['Organism'],
      growth_assay:                  ['Organism', 'Readout'],
      gas_exchange:                  ['Organism'],
      phenotyping_assay:             ['Organism', 'Readout'],
      general_protocol_search:       ['Method'],
    };
    const alwaysRequired = ['Intent'];
    const subIntent = profile.sub_intent || intent?.sub_intent || intent?.intent || '';
    const requiredSet = new Set([
      ...alwaysRequired,
      ...(requiredFieldsByIntent[subIntent] || []),
    ]);

    const fields = rows.map(([label, value]) => {
      const shown = value && String(value).trim() ? String(value) : 'not specified';
      const missingClass = shown === 'not specified' ? ' missing' : '';
      const isOptional = !requiredSet.has(label) && !alwaysRequired.includes(label);
      const optionalClass = isOptional ? ' optional' : '';
      const optionalTag = isOptional ? '<span class="optional-tag">(optional)</span>' : '';
      return `
        <div class="profile-field${missingClass}${optionalClass}">
          <span class="label">${escapeHtml(label)}${optionalTag}</span>
          <span class="value">${escapeHtml(shown)}</span>
        </div>
      `;
    }).join('');

    return `
      <div class="profile-card">
        <h3>Structured experiment profile</h3>
        <div class="profile-grid">${fields}</div>
      </div>
    `;
  }

  function renderQuickOptions(options) {
    if (!options || !options.length) return '';
    return `
      <div class="quick-options">
        ${options.map(option => {
          const encoded = JSON.stringify(option).replace(/"/g, '&quot;');
          return `
          <button class="quick-option-btn" onclick="sendQuickAnswer(${encoded})">
            ${escapeHtml(option)}
          </button>
        `;
        }).join('')}
        <button class="quick-option-btn" style="background-color: #f0f0f0; color: #666;" onclick="sendQuickAnswer('not sure')">
          Skip
        </button>
      </div>
      <div class="quick-options-hint">Others: please specify in the search box</div>
    `;
  }

  function sendQuickAnswer(answer) {
    const input = document.getElementById('query-input');
    input.value = answer;
    sendQuery();
  }

  function renderQuerySelection(queries) {
    if (!queries || !queries.length) return '';
    latestCandidateQueries = queries;
    const rows = queries.map((query, i) => {
      const encoded = JSON.stringify(query).replace(/"/g, '&quot;');
      return `
        <div class="candidate-query-row">
          <div class="candidate-query-text">${i + 1}. ${escapeHtml(query)}</div>
          <button class="candidate-query-btn" onclick="confirmCandidateSearch(${encoded})">Search</button>
        </div>
      `;
    }).join('');
    const first = escapeAttr(queries[0] || '');
    return `
      <div class="query-selection-card">
        <h3>Suggested search queries</h3>
        <p>Select one query, edit it, or search all candidates.</p>
        <div class="candidate-query-list">${rows}</div>
        <div class="candidate-edit-row">
          <input id="candidate-query-input" value="${first}" />
          <button class="candidate-query-btn" onclick="confirmEditedCandidateSearch()">Search edited</button>
          <button class="candidate-query-btn secondary" onclick="confirmCandidateSearch('', true)">Search all</button>
        </div>
      </div>
    `;
  }

  function confirmCandidateSearch(query, searchAll = false) {
    pendingSearchConfirmed = true;
    pendingSelectedSearchQuery = searchAll ? (latestCandidateQueries[0] || '') : query;
    pendingSearchAll = Boolean(searchAll);
    const input = document.getElementById('query-input');
    input.value = searchAll ? 'Search all suggested queries' : pendingSelectedSearchQuery;
    sendQuery();
  }

  function confirmEditedCandidateSearch() {
    const candidateInput = document.getElementById('candidate-query-input');
    const edited = candidateInput?.value?.trim() || '';
    if (!edited) return;
    confirmCandidateSearch(edited, false);
  }

  function renderMatchNotes(result) {
    const parts = [];
    if (result.why_it_matches) {
      parts.push(`<div><strong>Why it matches:</strong> ${escapeHtml(result.why_it_matches)}</div>`);
    }
    if (result.may_not_fit && result.may_not_fit.length) {
      parts.push(`<div><strong>May not fit:</strong> ${escapeHtml(result.may_not_fit.join(' '))}</div>`);
    }
    if (result.assumptions && result.assumptions.length) {
      parts.push(`<div><strong>Assumptions:</strong> ${escapeHtml(result.assumptions.join(' '))}</div>`);
    }
    if (result.missing_information && result.missing_information.length) {
      parts.push(`<div><strong>Still missing:</strong> ${escapeHtml(result.missing_information.join(', '))}</div>`);
    }
    return parts.length ? `<div class="match-explanation">${parts.join('')}</div>` : '';
  }

  // -------------------------------------------------------------------------
  // Feedback: pre-fill the input with a narrowing prompt
  // -------------------------------------------------------------------------

  function handleFeedback(optionType) {
    const input = document.getElementById('query-input');
    const prefixes = {
      'organism':   lastSearchQuery + ' in ',
      'technique':  lastSearchQuery + ' using ',
      'sample':     lastSearchQuery + ' from ',
      'goal':       lastSearchQuery + ' for ',
    };
    input.value = prefixes[optionType] || lastSearchQuery + ' ';
    input.focus();
    input.setSelectionRange(input.value.length, input.value.length);
    // The user will complete the sentence and submit — skip clarification check
    skipClarification = true;
  }

  // -------------------------------------------------------------------------
  // Main send function
  // -------------------------------------------------------------------------

  async function sendQuery() {
    const input = document.getElementById('query-input');
    const btn = document.getElementById('send-btn');
    const query = input.value.trim();
    if (!query) return;

    input.value = '';
    btn.disabled = true;

    // Capture the flag for this request, then reset it
    const skipThisTime = skipClarification;
    skipClarification = false;
    // If the assistant just asked a clarification, this message answers it.
    const isClarificationAnswer = awaitingClarificationAnswer;
    awaitingClarificationAnswer = false;
    const conversationForRequest = currentExperimentQuery || null;
    const searchConfirmed = pendingSearchConfirmed;
    const selectedSearchQuery = pendingSelectedSearchQuery || query;
    const searchAll = pendingSearchAll;
    const candidateQueriesForRequest = [...latestCandidateQueries];
    const payloadQuery = searchConfirmed
      ? (searchAll ? (candidateQueriesForRequest[0] || selectedSearchQuery) : selectedSearchQuery)
      : query;
    pendingSearchConfirmed = false;
    pendingSelectedSearchQuery = '';
    pendingSearchAll = false;

    appendMessage('user', `<div class="bubble">${escapeHtml(query)}</div>`);

    const thinkingMsg = appendMessage('assistant', `
      <div class="bubble">
        <div class="thinking">
          <div class="dot-anim"><span></span><span></span><span></span></div>
          <span>Thinking...</span>
        </div>
      </div>
    `);

    try {
      const providerSelect = document.getElementById('provider-select');
      const selectedProvider = providerSelect ? providerSelect.value : null;
      const searchModeSelect = document.getElementById('search-mode-select');
      const selectedSearchMode = searchModeSelect ? searchModeSelect.value : 'local';
      const perSourceSelect = document.getElementById('per-source-select');
      const resultsPerProvider = perSourceSelect ? parseInt(perSourceSelect.value, 10) : 5;

      const resp = await fetch(`${BACKEND}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          query: payloadQuery,
          top_k: 5,
          explain: true,
          skip_clarification: skipThisTime,
          search_mode: selectedSearchMode,
          experiment_profile: experimentProfile,
          conversation_query: conversationForRequest,
          search_confirmed: searchConfirmed,
          selected_search_query: selectedSearchQuery,
          search_all: searchAll,
          candidate_search_queries: candidateQueriesForRequest,
          is_clarification_answer: isClarificationAnswer,
          provider: selectedProvider || null,
          results_per_provider: resultsPerProvider,
        }),
      });

      thinkingMsg.remove();

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        appendMessage('assistant', `<div class="bubble"><div class="error-bubble">Error: ${escapeHtml(err.detail || resp.statusText)}</div></div>`);
        return;
      }

      const data = await resp.json();
      markBackendOnline();

      // -- New topic detected: backend cleared the carried-over profile --
      if (data.new_search) {
        experimentProfile = null;
        currentExperimentQuery = '';
        appendMessage('assistant', `
          <div class="bubble">
            <div class="clarification-bubble">🔄 <strong>Starting a new search</strong> — I cleared the previous experiment context since this looks like a different topic.</div>
          </div>
        `);
      }

      if (data.experiment_profile) experimentProfile = data.experiment_profile;
      if (data.conversation_query) currentExperimentQuery = data.conversation_query;

      // -- Chitchat --
      if (data.intent === 'chitchat') {
        latestCandidateQueries = [];
        appendMessage('assistant', `<div class="bubble">${escapeHtml(data.reply || '')}</div>`);
        return;
      }

      // -- Clarification needed --
      if (data.intent === 'clarification') {
        latestCandidateQueries = [];
        // The user's next message answers this clarification — flag it so the
        // backend refines the profile instead of treating it as a new topic.
        awaitingClarificationAnswer = true;
        appendMessage('assistant', `
          <div class="bubble">
            <div class="clarification-bubble">
              ${escapeHtml(data.reply || '')}
              ${renderQuickOptions(data.clarification?.options || [])}
            </div>
            ${renderExperimentProfile(data.experiment_profile, data.experiment_intent)}
          </div>
        `);
        return;
      }

      // -- Candidate search query selection --
      if (data.intent === 'query_selection') {
        latestCandidateQueries = data.candidate_search_queries || [];
        appendMessage('assistant', `
          <div class="bubble">
            ${renderExperimentProfile(data.experiment_profile, data.experiment_intent)}
            ${renderQuerySelection(latestCandidateQueries)}
          </div>
        `);
        return;
      }

      // -- Search results --
      lastSearchQuery = data.search_query || query;

      let html = '<div class="bubble">';

      // Which LLM produced these results (provider + model).
      if (data.llm_model) {
        html += `<div style="font-size:11px;color:#8a8f9c;margin-bottom:10px;">
          🧠 Model: <strong style="color:#5e35b1;">${escapeHtml(data.llm_model)}</strong>
          <span style="color:#aab;">(${escapeHtml(data.llm_provider || '')})</span>
        </div>`;
      }

      html += renderExperimentProfile(data.experiment_profile, data.experiment_intent);

      // LLM explanation (only shown when Ollama is running)
      if (data.explanation) {
        html += `<div class="explanation">${escapeHtml(data.explanation)}</div>`;
      }

      // Expanded queries used for this search
      if (data.expanded_queries && data.expanded_queries.length > 1) {
        const tags = data.expanded_queries
          .map(q => `<span>${escapeHtml(q)}</span>`)
          .join('');
        html += `
          <div class="expanded-queries">
            <span class="label">Also searched:</span>${tags}
          </div>
        `;
      }

      if (data.search_query && data.search_query !== query) {
        html += `
          <div class="expanded-queries">
            <span class="label">Structured query:</span><span>${escapeHtml(data.search_query)}</span>
          </div>
        `;
      }

      // Protocol result cards
      html += '<div class="results-grid" style="margin-top:12px;">';
      // Blended lists mix protocols.io + PubMed — use the unified blend_score for a
      // comparable bar across both sources, falling back to legacy scores.
      const scoreOf = (r) => r.blend_score ?? r.profile_score ?? r.combined_score ?? r.score ?? 0;
      const maxScore = Math.max(1e-6, ...data.results.map(scoreOf));

      data.results.forEach((r, i) => {
        const displayScore = scoreOf(r);
        const scorePercent = Math.round((displayScore / maxScore) * 100);
        const authorsText = (r.authors || []).slice(0, 2).join(', ')
          + (r.authors && r.authors.length > 2 ? ' et al.' : '');
        const keywords = (r.keywords || []).slice(0, 4)
          .map(k => `<span class="tag">${escapeHtml(k)}</span>`).join('');
        // Prefer the backend's ready-to-click url (DOI-preferred, always resolves).
        // Fall back to building a /view/ link only if url is absent.
        const link = r.url
          ? r.url
          : (r.uri ? `https://www.protocols.io/view/${r.uri}` : 'https://www.protocols.io');
        const matchBadge = r.match_count > 1
          ? `<span class="tag" style="background:#e8f5e9;color:#2e7d32;">matched ${r.match_count} queries</span>`
          : '';
        const penaltyBadge = r.relevance_penalty < 0.5
          ? `<span class="tag" style="background:#fff3e0;color:#e65100;">low relevance</span>`
          : '';
        const reqBadge = r.required_terms && r.required_terms.length
          ? `<span class="tag" style="background:#f3e5f5;color:#6a1b9a;">must: ${r.required_terms.join(' + ')}</span>`
          : '';
        // Source badge: distinguish PubMed literature from protocols.io protocols.
        const isPubmed = r.source === 'pubmed';
        const sourceBadge = isPubmed
          ? `<span class="tag" style="background:#e3f2fd;color:#1565c0;">PubMed</span>`
          : `<span class="tag" style="background:#ede7f6;color:#5e35b1;">protocols.io</span>`;

        html += `
          <div class="protocol-card">
            <div class="rank">Match #${i + 1} ${sourceBadge}</div>
            <div class="title">
              <a href="${escapeHtml(link)}" target="_blank" rel="noopener">${escapeHtml(r.title || 'Untitled Protocol')}</a>
            </div>
            ${r.description ? `<div class="desc">${escapeHtml(r.description.slice(0, 200))}${r.description.length > 200 ? '…' : ''}</div>` : ''}
            <div class="meta">
              ${authorsText ? `<span>👤 ${escapeHtml(authorsText)}</span>` : ''}
              ${r.doi ? `<span>DOI: ${escapeHtml(r.doi)}</span>` : ''}
              ${keywords}
              ${matchBadge}
              ${penaltyBadge}
              ${reqBadge}
            </div>
            ${renderMatchNotes(r)}
            <div class="score-bar"><div class="fill" style="width:${scorePercent}%"></div></div>
          </div>
        `;
      });

      html += '</div>';

      // Feedback section
      if (data.feedback_prompt) {
        html += `
          <div class="feedback-section">
            <p>${escapeHtml(data.feedback_prompt)}</p>
            <div class="feedback-buttons">
              <button class="feedback-btn" onclick="handleFeedback('organism')">Narrow by organism</button>
              <button class="feedback-btn" onclick="handleFeedback('technique')">Narrow by technique</button>
              <button class="feedback-btn" onclick="handleFeedback('sample')">Narrow by sample type</button>
              <button class="feedback-btn" onclick="handleFeedback('goal')">Narrow by goal</button>
            </div>
          </div>
        `;
      }

      html += '</div>';
      appendMessage('assistant', html);

    } catch (e) {
      thinkingMsg.remove();
      appendMessage('assistant', `<div class="bubble"><div class="error-bubble">Could not reach the backend. Is it running?<br><code>python run.py</code></div></div>`);
    } finally {
      btn.disabled = false;
      input.focus();
    }
  }
</script>
